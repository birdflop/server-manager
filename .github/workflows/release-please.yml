name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish (${{ matrix.os }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build installers
        run: npm run package
        env:
          # No code-signing certificates in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload installers to release
        shell: bash
        run: |
          shopt -s nullglob
          # latest*.yml = auto-update metadata (excludes builder-debug.yml).
          files=(dist/*.exe dist/*.dmg dist/*.zip dist/*.AppImage dist/*.deb dist/latest*.yml dist/*.blockmap)
          echo "Uploading: ${files[*]}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
