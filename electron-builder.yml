appId: org.birdflop.servermanager
productName: Birdflop Server Manager
# Space-free artifact names so the built file, latest.yml, and the uploaded GitHub
# asset always match — spaces in productName otherwise break electron-updater (404).
artifactName: ${name}-${version}-${arch}.${ext}
afterPack: build/afterPack.js
publish:
  provider: github
  owner: birdflop
  repo: server-manager
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
    - deb
  category: Development
  synopsis: Local Minecraft test-server manager
  maintainer: Birdflop <engineering@birdflop.com>
  syncDesktopName: true
