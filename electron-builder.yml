appId: org.birdflop.servermanager
productName: Birdflop Server Manager
afterPack: build/afterPack.js
publish:
  provider: github
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.developer-tools
linux:
  target:
    - AppImage
    - deb
  category: Development
  synopsis: Local Minecraft test-server manager
  maintainer: Birdflop <engineering@birdflop.com>
  syncDesktopName: true
